name: CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + Install + Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code style check (flake8)
        run: |
          pip install flake8
          flake8 src/ app/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E221,E225,E231,E251,E302,E303,E401,E501,F401,F541,W503,E127,E203,E241,E226,W293,W292,E305 \
            --statistics

      - name: Smoke test — import all modules
        run: |
          pip install pytest
          python -m pytest tests/test_imports.py -v

  # ── CD: runs only after CI passes, only on main ──────────────────────────────
  cd:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci                          # waits for CI to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push fraud-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: hrishi319/fraud-api:latest

      - name: Build & Push fraud-dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: hrishi319/fraud-dashboard:latest

      - name: Build & Push fraud-producer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.producer
          push: true
          tags: hrishi319/fraud-producer:latest

      - name: Build & Push fraud-consumer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.consumer
          push: true
          tags: hrishi319/fraud-consumer:latest