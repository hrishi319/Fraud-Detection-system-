name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + Install + Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code style check (flake8)
        run: |
          pip install flake8
          flake8 src/ app/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E221,E225,E231,E251,E302,E303,E401,E501,F401,F541,W503,E127,E203 \
            --statistics
            
      - name: Smoke test — import all modules
        run: |
          pip install pytest
          python -m pytest tests/test_imports.py -v
